
<!DOCTYPE html>
<html lang="ru">
<head>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; margin: 0; }
    h2 { text-align: center; margin-bottom: 20px; }

    }
    .btn {
      padding: 8px 16px; border: none; border-radius: 5px;
      background: #D96B1C; color: #fff; cursor: pointer; font-size: 14px;
    }
    .btn:hover { background: #C36019; }
    #avg { text-align: center; margin-top: 6px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f4f4f4; cursor: pointer; }
    @media (max-width: 480px) {
      body { font-size: 12px; padding: 10px; }
      th, td { padding: 4px; font-size: 10px; }
      .btn { flex: 1 1 auto; min-width: 90px; }
    }
  </style>
</head>
<body>
  <h2>Выберите категорию</h2>
  <div class="btn-container">
    <button class="btn" onclick="filter('Начинающие')">Начинающие</button><button class="btn" onclick="filter('На Разряд')">На Разряд</button><button class="btn" onclick="filter('Ожидающие участия')">Ожидающие участия</button>
  </div>

  <div id="avg"></div>

  <table id="tab">
    <thead><tr id="hdr"></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    var data = [{"group":"Начинающие","fullName":"Сапронов  Иван Николаевич ","birth":"2015","createdAt":"","createdAtTs":0,"id":"155017","rt":"899"},{"group":"Начинающие","fullName":"Наркевич  Елизавета  Леонидовна ","birth":"2015","createdAt":"","createdAtTs":0,"id":"164223","rt":"892"},{"group":"Начинающие","fullName":"Морозов Антон Павлович","birth":"2016","createdAt":"","createdAtTs":0,"id":"156301","rt":"888"},{"group":"Начинающие","fullName":"Данелян Давид Ашотович ","birth":"2016","createdAt":"","createdAtTs":0,"id":"162305","rt":"859"},{"group":"Начинающие","fullName":"Шкадина Дарья Вадимовна","birth":"2015","createdAt":"","createdAtTs":0,"id":"160446","rt":"755"},{"group":"Начинающие","fullName":"Киреев Илья Александрович","birth":"2015","createdAt":"","createdAtTs":0,"id":"150428","rt":"725"},{"group":"Начинающие","fullName":"Шалтыков  Александр  Константинович ","birth":"2018","createdAt":"","createdAtTs":0,"id":"159793","rt":"675"},{"group":"Начинающие","fullName":"Васин Радислав Антонович","birth":"2015","createdAt":"","createdAtTs":0,"id":"162302","rt":"627"},{"group":"Начинающие","fullName":"Торосян Арарат Ростомович","birth":"2018","createdAt":"","createdAtTs":0,"id":"164829","rt":"543"},{"group":"Начинающие","fullName":"Ерофеев Роберт Родионович","birth":"2016","createdAt":"","createdAtTs":0,"id":"159794","rt":"484"},{"group":"Начинающие","fullName":"Кириллов  Александр  Игоревич ","birth":"2018","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"Начинающие","fullName":"Семенихина Есения Олеговна","birth":"2018","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"Начинающие","fullName":"Самойлов Артемий Александрович","birth":"2017","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"На Разряд","fullName":"Асланов Демид Халидович","birth":"2011","createdAt":"","createdAtTs":0,"id":"567483","rt":"1535"},{"group":"На Разряд","fullName":"Рогожина Анна Анатольевна","birth":"2012","createdAt":"","createdAtTs":0,"id":"363650","rt":"1499"},{"group":"На Разряд","fullName":"Макшанцев Андрей Евгеньевич","birth":"2013","createdAt":"","createdAtTs":0,"id":"392265","rt":"1467"},{"group":"На Разряд","fullName":"Смирнов  Глеб  Станиславович ","birth":"2018","createdAt":"","createdAtTs":0,"id":"648368","rt":"1447"},{"group":"На Разряд","fullName":"Цовян Амалия  Давидовна","birth":"2011","createdAt":"","createdAtTs":0,"id":"667529","rt":"1420"},{"group":"На Разряд","fullName":"Зюльев Владислав Евгеньевич ","birth":"2014","createdAt":"","createdAtTs":0,"id":"438183","rt":"1367"},{"group":"На Разряд","fullName":"Бородин Денис Леонидович","birth":"2011","createdAt":"","createdAtTs":0,"id":"584517","rt":"1335"},{"group":"На Разряд","fullName":"Галстян Давид Варданович","birth":"2014","createdAt":"","createdAtTs":0,"id":"615681","rt":"1275"},{"group":"На Разряд","fullName":"Гильманов  Ринат  Дамирович ","birth":"2018","createdAt":"","createdAtTs":0,"id":"723491","rt":"1269"},{"group":"На Разряд","fullName":"Цукунфт Марк Герардович ","birth":"2016","createdAt":"","createdAtTs":0,"id":"521601","rt":"1242"},{"group":"На Разряд","fullName":"Мелехова Ася Юрьевна","birth":"2015","createdAt":"","createdAtTs":0,"id":"518204","rt":"1231"},{"group":"На Разряд","fullName":"Болковой Михаил Эдуардович","birth":"2014","createdAt":"","createdAtTs":0,"id":"396892","rt":"1146"},{"group":"На Разряд","fullName":"Пелипенко Владимир Антонович","birth":"2016","createdAt":"","createdAtTs":0,"id":"763948","rt":"1079"},{"group":"На Разряд","fullName":"Ивченков  Егор Андреевич ","birth":"2015","createdAt":"","createdAtTs":0,"id":"665171","rt":"1072"},{"group":"На Разряд","fullName":"Костомаров Александр Сергеевич","birth":"2018","createdAt":"","createdAtTs":0,"id":"682837","rt":"1065"},{"group":"На Разряд","fullName":"Коротун Егор Евгеньевич","birth":"2015","createdAt":"","createdAtTs":0,"id":"442205","rt":"1031"},{"group":"На Разряд","fullName":"Воронин Артем Викторович","birth":"2016","createdAt":"","createdAtTs":0,"id":"650053","rt":"1003"},{"group":"На Разряд","fullName":"Молчанов  Пётр  Ввдимович ","birth":"2014","createdAt":"","createdAtTs":0,"id":"","rt":"1000"},{"group":"На Разряд","fullName":"Марк  Азаров  Дмитриевич","birth":"2017","createdAt":"","createdAtTs":0,"id":"","rt":"1000"},{"group":"На Разряд","fullName":"Петко Михаил Александрович","birth":"2009","createdAt":"","createdAtTs":0,"id":"","rt":"1000"}];
    var grp  = 'Начинающие';
    var col  = 'rt';
    var asc  = false;
    var waitingGroupName = 'Ожидающие участия';

    function sortBy(c) {
      if (col === c) asc = !asc;
      else {
        col = c;
        asc = false;
      }
      render();
    }

    function filter(g) {
      grp = g;

      if (grp === waitingGroupName) {
        col = 'createdAtTs';
        asc = true;
      } else {
        col = 'rt';
        asc = false;
      }

      render();
    }

    function render() {
      var hdr = document.getElementById('hdr');

      if (grp === waitingGroupName) {
        hdr.innerHTML = [
          '<th>#</th>',
          '<th onclick="sortBy(\'fullName\')">ФИО</th>',
          '<th onclick="sortBy(\'birth\')">Год рожд.</th>',
          '<th onclick="sortBy(\'createdAtTs\')">Дата заявки</th>'
        ].join('');
      } else {
        hdr.innerHTML = [
          '<th>#</th>',
          '<th onclick="sortBy(\'fullName\')">ФИО</th>',
          '<th onclick="sortBy(\'id\')">ID</th>',
          '<th onclick="sortBy(\'birth\')">Год рожд.</th>',
          '<th onclick="sortBy(\'rt\')">Рейтинг</th>'
        ].join('');
      }

      var body = document.querySelector('#tab tbody');
      body.innerHTML = '';

      var filtered = data.filter(function(p) {
        return p.group === grp;
      });

      if (grp === waitingGroupName) {
        document.getElementById('avg').textContent =
          'Количество заявок в ожидании: ' + filtered.length;
      } else {
        var sum = 0, cnt = 0;
        for (var k = 0; k < filtered.length; k++) {
          var n = parseFloat(filtered[k].rt);
          if (!isNaN(n)) {
            sum += n;
            cnt++;
          }
        }

        var avg = cnt ? Math.round(sum / cnt) : 0;
        document.getElementById('avg').textContent =
          'Средний рейтинг группы: ' + avg + ' (участников: ' + filtered.length + ')';
      }

      filtered.sort(function(a, b) {
        var A = a[col] || '';
        var B = b[col] || '';

        if (col === 'createdAtTs') {
          var tA = parseFloat(A) || 0;
          var tB = parseFloat(B) || 0;
          return asc ? tA - tB : tB - tA;
        }

        var nA = parseFloat(A);
        var nB = parseFloat(B);

        if (!isNaN(nA) && !isNaN(nB)) {
          return asc ? nA - nB : nB - nA;
        }

        return A < B ? (asc ? -1 : 1) : A > B ? (asc ? 1 : -1) : 0;
      });

      filtered.forEach(function(p, i) {
        if (grp === waitingGroupName) {
          body.insertAdjacentHTML(
            'beforeend',
            '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + (p.fullName || '') + '</td>' +
              '<td>' + (p.birth || '') + '</td>' +
              '<td>' + (p.createdAt || '') + '</td>' +
            '</tr>'
          );
        } else {
          body.insertAdjacentHTML(
            'beforeend',
            '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + (p.fullName || '') + '</td>' +
              '<td>' + (p.id || '') + '</td>' +
              '<td>' + (p.birth || '') + '</td>' +
              '<td>' + (p.rt || '') + '</td>' +
            '</tr>'
          );
        }
      });
    }

    window.onload = render;
  </script>
</body>
</html>
