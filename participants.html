
<!DOCTYPE html>

<head>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; margin: 0; }
    h2 { text-align: center; margin-bottom: 20px; }

    }
    .btn {

      background: #D96B1C; color: #fff; cursor: pointer; font-size: 14px;
    }
    .btn:hover { background: #C36019; }
    #avg { text-align: center; margin-top: 6px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f4f4f4; cursor: pointer; }
    @media (max-width: 480px) {
      body { font-size: 12px; padding: 10px; }
      th, td { padding: 4px; font-size: 10px; }
      .btn { flex: 1 1 auto; min-width: 90px; }
    }
  </style>
</head>
<body>
  <h2>Выберите категорию</h2>
  <div class="btn-container">
    <button class="btn" onclick="filter('Начинающие')">Начинающие</button><button class="btn" onclick="filter('На Разряд')">На Разряд</button><button class="btn" onclick="filter('Ожидающие участия')">Ожидающие участия</button>
  </div>

  <div id="avg"></div>

  <table id="tab">
    <thead><tr id="hdr"></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    var data = [{"group":"Начинающие","fullName":"Кириллов  Александр  Алексеевич ","birth":"2018","createdAt":"","createdAtTs":0,"id":"146231","rt":"851"},{"group":"Начинающие","fullName":"Стою Виктория  Сергеевна","birth":"2017","createdAt":"","createdAtTs":0,"id":"142361","rt":"838"},{"group":"Начинающие","fullName":"Балюн Богдан Юрьевич","birth":"2017","createdAt":"","createdAtTs":0,"id":"152802","rt":"703"},{"group":"Начинающие","fullName":"Тюняев Тимур Александрович ","birth":"2016","createdAt":"","createdAtTs":0,"id":"151759","rt":"628"},{"group":"Начинающие","fullName":"Боков Егор Дмитриевич","birth":"2015","createdAt":"","createdAtTs":0,"id":"153001","rt":"567"},{"group":"Начинающие","fullName":"Гаврош Михаил Дмитриевич","birth":"2016","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"Начинающие","fullName":"Сулейманов Эфе Фаридович","birth":"2019","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"Начинающие","fullName":"Арутюнова Софья Артемовна","birth":"2016","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"Начинающие","fullName":"Торосян Арарат  Ростомович","birth":"2018","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"Начинающие","fullName":"Семенихина Есения Олеговна","birth":"2018","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"Начинающие","fullName":"Дука Михаил  Юрьевич ","birth":"2015","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"Начинающие","fullName":"Сурганова Агния Викторовна","birth":"2018","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"Начинающие","fullName":"Давлетьянов Ренат Анварович","birth":"2015","createdAt":"","createdAtTs":0,"id":"","rt":""},{"group":"На Разряд","fullName":"Немысский  Павел  Андреевич","birth":"2015","createdAt":"","createdAtTs":0,"id":"493372","rt":"1446"},{"group":"На Разряд","fullName":"Степаненко Марья Анатольевна","birth":"2010","createdAt":"","createdAtTs":0,"id":"302366","rt":"1443"},{"group":"На Разряд","fullName":"Фесенко  Иван Олегович ","birth":"2015","createdAt":"","createdAtTs":0,"id":"703775","rt":"1414"},{"group":"На Разряд","fullName":"Гончаров Архип Алексеевич","birth":"2011","createdAt":"","createdAtTs":0,"id":"749355","rt":"1401"},{"group":"На Разряд","fullName":"Перов Виктор Владимирович ","birth":"2015","createdAt":"","createdAtTs":0,"id":"566220","rt":"1399"},{"group":"На Разряд","fullName":"Цовян Амалия  Давидовна","birth":"2011","createdAt":"","createdAtTs":0,"id":"667529","rt":"1380"},{"group":"На Разряд","fullName":"Зюльев  Владислав  Евгеньевич ","birth":"2014","createdAt":"","createdAtTs":0,"id":"438183","rt":"1367"},{"group":"На Разряд","fullName":"Ким Лукьян Игоревич","birth":"2016","createdAt":"","createdAtTs":0,"id":"667260","rt":"1337"},{"group":"На Разряд","fullName":"Якубовский Филипп  Геннадьевич ","birth":"2017","createdAt":"","createdAtTs":0,"id":"466817","rt":"1327"},{"group":"На Разряд","fullName":"Рубайлов Дмитрий Михайлович","birth":"2014","createdAt":"","createdAtTs":0,"id":"475337","rt":"1291"},{"group":"На Разряд","fullName":"Наркевич  Елизавета  Леонидовна ","birth":"2015","createdAt":"","createdAtTs":0,"id":"762305","rt":"1189"},{"group":"На Разряд","fullName":"Австрейх Лев Леонидович","birth":"2017","createdAt":"","createdAtTs":0,"id":"560357","rt":"1180"},{"group":"На Разряд","fullName":"Минаев Андрей Данилович","birth":"2018","createdAt":"","createdAtTs":0,"id":"556670","rt":"1180"},{"group":"На Разряд","fullName":"Мельников  Матвей  Филиппович ","birth":"2017","createdAt":"","createdAtTs":0,"id":"670775","rt":"1157"},{"group":"На Разряд","fullName":"Саломатова  Екатерина  Дмитриевна ","birth":"2016","createdAt":"","createdAtTs":0,"id":"665172","rt":"1154"},{"group":"На Разряд","fullName":"Сальников Александр Александрович","birth":"2015","createdAt":"","createdAtTs":0,"id":"744267","rt":"1136"},{"group":"На Разряд","fullName":"Крыгин  Еремий Евгеньевич ","birth":"2018","createdAt":"","createdAtTs":0,"id":"669178","rt":"1064"},{"group":"На Разряд","fullName":"Андриянова Алиса Вячеславовна","birth":"2016","createdAt":"","createdAtTs":0,"id":"730950","rt":"1000"},{"group":"На Разряд","fullName":"Андриянова Майя Вячеславовна","birth":"2018","createdAt":"","createdAtTs":0,"id":"730951","rt":"1000"},{"group":"На Разряд","fullName":"Павел Серов Андреевич","birth":"2017","createdAt":"","createdAtTs":0,"id":"","rt":"1000"},{"group":"На Разряд","fullName":"Давид Галстян  Варданович","birth":"2014","createdAt":"","createdAtTs":0,"id":"","rt":"1000"},{"group":"На Разряд","fullName":"Цыганов Иван Дмитриевич","birth":"2013","createdAt":"","createdAtTs":0,"id":"726218","rt":""}];
    var grp  = 'Начинающие';
    var col  = 'rt';
    var asc  = false;
    var waitingGroupName = 'Ожидающие участия';

    function sortBy(c) {
      if (col === c) asc = !asc;
      else {
        col = c;
        asc = false;
      }
      render();
    }

    function filter(g) {
      grp = g;

      if (grp === waitingGroupName) {
        col = 'createdAtTs';
        asc = true;
      } else {
        col = 'rt';
        asc = false;
      }

      render();
    }

    function render() {
      var hdr = document.getElementById('hdr');

      if (grp === waitingGroupName) {
        hdr.innerHTML = [
          '<th>#</th>',
          '<th onclick="sortBy(\'fullName\')">ФИО</th>',
          '<th onclick="sortBy(\'birth\')">Год рожд.</th>',
          '<th onclick="sortBy(\'createdAtTs\')">Дата заявки</th>'
        ].join('');
      } else {
        hdr.innerHTML = [
          '<th>#</th>',
          '<th onclick="sortBy(\'fullName\')">ФИО</th>',
          '<th onclick="sortBy(\'id\')">ID</th>',
          '<th onclick="sortBy(\'birth\')">Год рожд.</th>',
          '<th onclick="sortBy(\'rt\')">Рейтинг</th>'
        ].join('');
      }

      var body = document.querySelector('#tab tbody');
      body.innerHTML = '';

      var filtered = data.filter(function(p) {
        return p.group === grp;
      });

      if (grp === waitingGroupName) {
        document.getElementById('avg').textContent =
          'Количество заявок в ожидании: ' + filtered.length;
      } else {
        var sum = 0, cnt = 0;
        for (var k = 0; k < filtered.length; k++) {
          var n = parseFloat(filtered[k].rt);
          if (!isNaN(n)) {
            sum += n;
            cnt++;
          }
        }

        var avg = cnt ? Math.round(sum / cnt) : 0;
        document.getElementById('avg').textContent =
          'Средний рейтинг группы: ' + avg + ' (участников: ' + filtered.length + ')';
      }

      filtered.sort(function(a, b) {
        var A = a[col] || '';
        var B = b[col] || '';

        if (col === 'createdAtTs') {
          var tA = parseFloat(A) || 0;
          var tB = parseFloat(B) || 0;
          return asc ? tA - tB : tB - tA;
        }

        var nA = parseFloat(A);
        var nB = parseFloat(B);

        if (!isNaN(nA) && !isNaN(nB)) {
          return asc ? nA - nB : nB - nA;
        }

        return A < B ? (asc ? -1 : 1) : A > B ? (asc ? 1 : -1) : 0;
      });

      filtered.forEach(function(p, i) {
        if (grp === waitingGroupName) {
          body.insertAdjacentHTML(
            'beforeend',
            '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + (p.fullName || '') + '</td>' +
              '<td>' + (p.birth || '') + '</td>' +
              '<td>' + (p.createdAt || '') + '</td>' +
            '</tr>'
          );
        } else {
          body.insertAdjacentHTML(
            'beforeend',
            '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + (p.fullName || '') + '</td>' +
              '<td>' + (p.id || '') + '</td>' +
              '<td>' + (p.birth || '') + '</td>' +
              '<td>' + (p.rt || '') + '</td>' +
            '</tr>'
          );
        }
      });
    }

    window.onload = render;
  </script>
</body>
</html>
