474","rt":"1485"},{"group":"На Разряд до 1700 ФШР","fullName":"Ананьев Николай Евгеньевич","birth":"2015","createdAt":"","createdAtTs":0,"id":"621581","rt":"1468"},{"group":"На Разряд до 1700 ФШР","fullName":"Шаврова Марфа Дмитриевна","birth":"2015","createdAt":"","createdAtTs":0,"id":"459104","rt":"1443"},{"group":"На Разряд до 1700 ФШР","fullName":"Степаненко Марья Анатольевна","birth":"2010","createdAt":"","createdAtTs":0,"id":"302366","rt":"1432"},{"group":"На Разряд до 1700 ФШР","fullName":"Самоделов  Данила Олегович","birth":"2013","createdAt":"","createdAtTs":0,"id":"378752","rt":"1369"},{"group":"На Разряд до 1700 ФШР","fullName":"Ганцев Кирилл Сергеевич ","birth":"2016","createdAt":"","createdAtTs":0,"id":"478522","rt":"1301"},{"group":"На Разряд до 1700 ФШР","fullName":"Цукунфт  Марк Герардович ","birth":"2016","createdAt":"","createdAtTs":0,"id":"521601","rt":"1283"},{"group":"На Разряд до 1700 ФШР","fullName":"Шапкин Тихон Александрович","birth":"2013","createdAt":"","createdAtTs":0,"id":"634358","rt":"1266"},{"group":"На Разряд до 1700 ФШР","fullName":"Страхов Михаил Александрович","birth":"2012","createdAt":"","createdAtTs":0,"id":"615740","rt":"1116"},{"group":"На Разряд до 1700 ФШР","fullName":"Григорьян Степаг Вадимович","birth":"2013","createdAt":"","createdAtTs":0,"id":"","rt":"1000"}];
    var grp  = 'На Разряд до 1250 ФШР';
    var col  = 'rt';
    var asc  = false;
    var waitingGroupName = 'Ожидающие участия';

    function sortBy(c) {
      if (col === c) asc = !asc;
      else {
        col = c;
        asc = false;
      }
      render();
    }

    function filter(g) {
      grp = g;

      if (grp === waitingGroupName) {
        col = 'createdAtTs';
        asc = true;
      } else {
        col = 'rt';
        asc = false;
      }

      render();
    }

    function render() {
      var hdr = document.getElementById('hdr');

      if (grp === waitingGroupName) {
        hdr.innerHTML = [
          '<th>#</th>',
          '<th onclick="sortBy(\'fullName\')">ФИО</th>',
          '<th onclick="sortBy(\'birth\')">Год рожд.</th>',
          '<th onclick="sortBy(\'createdAtTs\')">Дата заявки</th>'
        ].join('');
      } else {
        hdr.innerHTML = [
          '<th>#</th>',
          '<th onclick="sortBy(\'fullName\')">ФИО</th>',
          '<th onclick="sortBy(\'id\')">ID</th>',
          '<th onclick="sortBy(\'birth\')">Год рожд.</th>',
          '<th onclick="sortBy(\'rt\')">Рейтинг</th>'
        ].join('');
      }

      var body = document.querySelector('#tab tbody');
      body.innerHTML = '';

      var filtered = data.filter(function(p) {
        return p.group === grp;
      });

      if (grp === waitingGroupName) {
        document.getElementById('avg').textContent =
          'Количество заявок в ожидании: ' + filtered.length;
      } else {
        var sum = 0, cnt = 0;
        for (var k = 0; k < filtered.length; k++) {
          var n = parseFloat(filtered[k].rt);
          if (!isNaN(n)) {
            sum += n;
            cnt++;
          }
        }

        var avg = cnt ? Math.round(sum / cnt) : 0;
        document.getElementById('avg').textContent =
          'Средний рейтинг группы: ' + avg + ' (участников: ' + filtered.length + ')';
      }

      filtered.sort(function(a, b) {
        var A = a[col] || '';
        var B = b[col] || '';

        if (col === 'createdAtTs') {
          var tA = parseFloat(A) || 0;
          var tB = parseFloat(B) || 0;
          return asc ? tA - tB : tB - tA;
        }

        var nA = parseFloat(A);
        var nB = parseFloat(B);

        if (!isNaN(nA) && !isNaN(nB)) {
          return asc ? nA - nB : nB - nA;
        }

        return A < B ? (asc ? -1 : 1) : A > B ? (asc ? 1 : -1) : 0;
      });

      filtered.forEach(function(p, i) {
        if (grp === waitingGroupName) {
          body.insertAdjacentHTML(
            'beforeend',
            '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + (p.fullName || '') + '</td>' +
              '<td>' + (p.birth || '') + '</td>' +
              '<td>' + (p.createdAt || '') + '</td>' +
            '</tr>'
          );
        } else {
          body.insertAdjacentHTML(
            'beforeend',
            '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + (p.fullName || '') + '</td>' +
              '<td>' + (p.id || '') + '</td>' +
              '<td>' + (p.birth || '') + '</td>' +
              '<td>' + (p.rt || '') + '</td>' +
            '</tr>'
          );
        }
      });
    }

    window.onload = render;
  </script>
</body>
